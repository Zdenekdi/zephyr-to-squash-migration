name: Build Windows EXE & Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Verze releasu (např. v1.0.0)'
        required: false
        default: 'v0.0.0-dev'

permissions:
  contents: write
  id-token: write    # potřebné pro Azure Trusted Signing (OIDC)

jobs:
  build-windows-exe:
    name: Build .exe on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Build standalone EXE
        run: |
          pyinstaller ZephyrToSquash.spec --clean --noconfirm

      - name: Verify EXE was created
        run: |
          if (Test-Path "dist\ZephyrToSquash.exe") {
            $size = (Get-Item "dist\ZephyrToSquash.exe").Length / 1MB
            Write-Host "OK: ZephyrToSquash.exe ($([math]::Round($size,1)) MB)"
          } else {
            Write-Error "CHYBA: ZephyrToSquash.exe nebyl vytvořen!"
            exit 1
          }

      # ------------------------------------------------------------------ #
      # Podepisování – Azure Trusted Signing (volitelné)                    #
      # Pokud jsou nastaveny secrets AZURE_*, EXE bude podepsáno.          #
      # Bez secrets se přeskočí a EXE zůstane nepodepsáno.                 #
      # ------------------------------------------------------------------ #
      - name: Sign EXE with Azure Trusted Signing
        if: |
          env.AZURE_TENANT_ID != '' &&
          env.AZURE_CLIENT_ID != '' &&
          env.AZURE_CLIENT_SECRET != '' &&
          env.AZURE_SIGNING_ACCOUNT != '' &&
          env.AZURE_CERT_PROFILE != ''
        env:
          AZURE_TENANT_ID:      ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID:      ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET:  ${{ secrets.AZURE_CLIENT_SECRET }}
          AZURE_SIGNING_ACCOUNT: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          AZURE_CERT_PROFILE:   ${{ secrets.AZURE_CERT_PROFILE }}
          AZURE_ENDPOINT:       ${{ secrets.AZURE_ENDPOINT }}
        uses: azure/trusted-signing-action@v0.5.0
        with:
          azure-tenant-id:            ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id:            ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret:        ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint:                   ${{ secrets.AZURE_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name:   ${{ secrets.AZURE_CERT_PROFILE }}
          files-folder:               dist
          files-folder-filter:        exe
          file-digest:                SHA256
          timestamp-rfc3161:          http://timestamp.acs.microsoft.com
          timestamp-digest:           SHA256

      # ------------------------------------------------------------------ #
      # Alternativa: Self-signed certifikát (záloha pokud není Azure)       #
      # Odstraní "Unknown Publisher", ale SmartScreen varování zůstane.    #
      # Nastavte secret SIGNING_CERT_PFX (base64) a SIGNING_CERT_PASSWORD  #
      # ------------------------------------------------------------------ #
      - name: Sign EXE with self-signed certificate (fallback)
        if: |
          env.SIGNING_CERT_PFX != '' &&
          env.AZURE_TENANT_ID == ''
        env:
          SIGNING_CERT_PFX:      ${{ secrets.SIGNING_CERT_PFX }}
          SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
        shell: pwsh
        run: |
          # Dekódujeme PFX ze secret
          $pfxBytes = [Convert]::FromBase64String($env:SIGNING_CERT_PFX)
          $pfxPath  = Join-Path $env:TEMP "signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, $pfxBytes)

          # Najdeme signtool (součást Windows SDK)
          $signtool = Get-ChildItem -Recurse `
            "C:\Program Files (x86)\Windows Kits\10\bin" `
            -Filter "signtool.exe" -ErrorAction SilentlyContinue |
            Sort-Object FullName -Descending | Select-Object -First 1

          if (-not $signtool) {
            Write-Warning "signtool.exe nenalezen – přeskakuji podepisování"
            exit 0
          }

          & $signtool.FullName sign `
            /f  $pfxPath `
            /p  $env:SIGNING_CERT_PASSWORD `
            /fd SHA256 `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            /d  "Zephyr to Squash TM Migration Tool" `
            "dist\ZephyrToSquash.exe"

          Remove-Item $pfxPath -Force
          Write-Host "EXE podepsáno self-signed certifikátem."

      - name: Copy README and env example next to EXE
        run: |
          Copy-Item ".env.example" "dist\.env.example"
          Copy-Item "README.md"    "dist\README.md"

      - name: Package EXE into ZIP
        run: |
          Compress-Archive `
            -Path "dist\ZephyrToSquash.exe","dist\.env.example","dist\README.md" `
            -DestinationPath "dist\ZephyrToSquash-windows.zip"
          $size = (Get-Item "dist\ZephyrToSquash-windows.zip").Length / 1MB
          Write-Host "ZIP: $([math]::Round($size,1)) MB"

      - name: Determine release tag
        id: get_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: "Zephyr → Squash TM Tool ${{ steps.get_tag.outputs.tag }}"
          body: |
            ## 🚀 Zephyr to Squash TM Migration Tool ${{ steps.get_tag.outputs.tag }}

            ### ⬇️ Stažení pro Windows

            | Soubor | Popis |
            |---|---|
            | **`ZephyrToSquash-windows.zip`** | ✅ Doporučeno – ZIP archiv |
            | `ZephyrToSquash.exe` | Přímý spustitelný soubor |

            **Python není potřeba instalovat.**

            ---

            ### ⚠️ Varování prohlížeče / SmartScreen

            **Edge:** `...` → Ponechat → Zobrazit více → Přesto ponechat  
            **Chrome:** šipka `▾` → Ponechat  
            **SmartScreen při spuštění:** Další informace → Přesto spustit

            > Zdrojový kód je veřejný: [github.com/Zdenekdi/zephyr-to-squash-migration](https://github.com/Zdenekdi/zephyr-to-squash-migration)

            ---

            ### Co nástroj umí
            - **Online API migrace** – přenos testů ze Zephyr Scale do Squash TM přes REST API
            - **Offline Excel konverze** – převod Zephyr exportu na Squash TM importní soubor
          draft: false
          prerelease: false
          files: |
            dist/ZephyrToSquash-windows.zip
            dist/ZephyrToSquash.exe
