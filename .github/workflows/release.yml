name: Build Windows EXE & Release

on:
  push:
    tags:
      - 'v*.*.*'        # spustí se při push tagu jako v1.0.0
  workflow_dispatch:    # nebo ručně přes GitHub UI
    inputs:
      tag_name:
        description: 'Verze releasu (např. v1.0.0)'
        required: false
        default: 'v0.0.0-dev'

permissions:
  contents: write       # potřebné pro vytvoření GitHub Release

jobs:
  build-windows-exe:
    name: Build .exe on Windows
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.11.1

      - name: Build standalone EXE
        run: |
          pyinstaller ZephyrToSquash.spec --clean --noconfirm

      - name: Verify EXE was created
        run: |
          if (Test-Path "dist\ZephyrToSquash.exe") {
            $size = (Get-Item "dist\ZephyrToSquash.exe").Length / 1MB
            Write-Host "OK: ZephyrToSquash.exe vytvoren ($([math]::Round($size,1)) MB)"
          } else {
            Write-Error "CHYBA: ZephyrToSquash.exe nebyl vytvoret!"
            exit 1
          }

      - name: Copy README and env example next to EXE
        run: |
          Copy-Item ".env.example" "dist\.env.example"
          Copy-Item "README.md" "dist\README.md"

      - name: Package EXE into ZIP (browsers block .exe less aggressively)
        run: |
          Compress-Archive -Path "dist\ZephyrToSquash.exe", "dist\.env.example", "dist\README.md" `
            -DestinationPath "dist\ZephyrToSquash-windows.zip"
          $size = (Get-Item "dist\ZephyrToSquash-windows.zip").Length / 1MB
          Write-Host "OK: ZephyrToSquash-windows.zip ($([math]::Round($size,1)) MB)"

      - name: Determine release tag
        id: get_tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.event.inputs.tag_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release and upload artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_tag.outputs.tag }}
          name: "Zephyr → Squash TM Tool ${{ steps.get_tag.outputs.tag }}"
          body: |
            ## 🚀 Zephyr to Squash TM Migration Tool ${{ steps.get_tag.outputs.tag }}

            ### ⬇️ Stažení pro Windows

            | Soubor | Popis |
            |---|---|
            | **`ZephyrToSquash-windows.zip`** | ✅ Doporučeno – ZIP archiv, prohlížeče ho blokují méně |
            | `ZephyrToSquash.exe` | Přímý spustitelný soubor |

            **Python není potřeba instalovat** – vše je součástí souboru.

            ---

            ### ⚠️ Jak obejít varování prohlížeče (Edge / Chrome)

            Prohlížeče mohou zobrazit varování při stahování `.exe`. Aplikace je bezpečná – varování se zobrazuje proto, že soubor není komerčně podepsán.

            **Edge:**
            1. Klikněte na `...` vedle staženého souboru → **Ponechat**
            2. Klikněte na **Zobrazit více** → **Přesto ponechat**

            **Chrome:**
            1. Klikněte na šipku ▾ vedle staženého souboru → **Ponechat**

            **Windows SmartScreen** (při spuštění):
            1. Klikněte na **Další informace**
            2. Klikněte na **Přesto spustit**

            > Soubor je generován automaticky z [open-source kódu](https://github.com/Zdenekdi/zephyr-to-squash-migration) přes GitHub Actions – každý si může ověřit, co obsahuje.

            ---

            ### Co nástroj umí
            - **Online API migrace** – přímý přenos testů ze Zephyr Scale do Squash TM přes REST API
            - **Offline Excel konverze** – převod exportovaného Excel souboru ze Zephyru na importní soubor pro Squash TM

            ### Konfigurace
            Při prvním spuštění vyplňte přihlašovací údaje přímo v GUI.
            Volitelně umístěte vedle `.exe` soubor `.env` (šablona je přibalena v ZIP).
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            dist/ZephyrToSquash-windows.zip
            dist/ZephyrToSquash.exe
